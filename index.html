<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BasedDodge 🚀</title>
    <style>
        body { margin:0; background:#0a0a0a; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; }
        canvas { border:2px solid #00ff9d; box-shadow:0 0 20px rgba(0,255,157,0.4); }
    </style>
</head>
<body>
    <canvas id="c" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let gameRunning = true;

        // Player rocket
        const player = { x: 120, y: 280, vx: 0, vy: 0, size: 28 };

        // Obstacles & Orbs
        let obstacles = [];
        let orbs = [];

        const keys = {};

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

        function draw() {
            // Background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simple stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 40; i++) {
                let x = (i * 47 + score * 0.8) % (canvas.width + 20) - 10;
                ctx.fillRect(x, (i * 13) % canvas.height, 1.5, 1.5);
            }

            // Player rocket
            ctx.fillStyle = '#00ff9d';
            ctx.fillRect(player.x, player.y, player.size, 18);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(player.x + 20, player.y + 4, 12, 10);

            // Flame
            ctx.fillStyle = '#ff4400';
            ctx.fillRect(player.x - 12, player.y + 5, 14, 8);

            // Obstacles
            ctx.fillStyle = '#ff2222';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, 30, 60);
            }

            // Based Orbs 💎
            ctx.fillStyle = '#ffff00';
            for (let orb of orbs) {
                ctx.beginPath();
                ctx.arc(orb.x + 12, orb.y + 12, 12, 0, Math.PI * 2);
                ctx.fill();
            }

            // Score display (new in this commit)
            ctx.fillStyle = '#00ff9d';
            ctx.font = 'bold 24px Courier New';
            ctx.fillText(`SCORE: ${Math.floor(score)}`, 30, 50);
        }

        function update() {
            if (!gameRunning) return;
