<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BasedDodge 🚀</title>
    <style>
        body { 
            margin:0; 
            background:#0a0a0a; 
            overflow:hidden; 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            height:100vh; 
            font-family: 'Courier New', monospace;
        }
        canvas { 
            border:2px solid #00ff9d; 
            box-shadow:0 0 20px rgba(0,255,157,0.4); 
        }
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,10,0.95);
            border: 3px solid #00ff9d;
            padding: 40px 60px;
            text-align: center;
            color: #00ff9d;
            display: none;
            z-index: 100;
        }
        button {
            background: #00ff9d;
            color: #0a0a0a;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #00cc7a; }
    </style>
</head>
<body>
    <canvas id="c" width="800" height="600"></canvas>

    <div id="startScreen">
        <h1>BASED DODGE 🚀</h1>
        <p>Dodge red threats<br>Collect Based Orbs 💎</p>
        <p>Use ARROW KEYS or WASD</p>
        <button onclick="startGame()">LAUNCH INTO THE BASEDVERSE</button>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');

        let score = 0;
        let gameRunning = false;
        let difficulty = 1;   // new: will slowly increase

        // Player rocket
        const player = { x: 120, y: 280, vx: 0, vy: 0, size: 28 };

        // Game objects
        let obstacles = [];
        let orbs = [];

        const keys = {};

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

        function draw() {
            // Background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simple stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 40; i++) {
                let x = (i * 47 + score * 0.8) % (canvas.width + 20) - 10;
                ctx.fillRect(x, (i * 13) % canvas.height, 1.5, 1.5);
            }

            if (!gameRunning) return;

            // Player rocket
            ctx.fillStyle = '#00ff9d';
            ctx.fillRect(player.x, player.y, player.size, 18);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(player.x + 20, player.y + 4, 12, 10);

            // Flame
            ctx.fillStyle = '#ff4400';
            ctx.fillRect(player.x - 12, player.y + 5, 14, 8);

            // Obstacles
            ctx.fillStyle = '#ff2222';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, 30, 60);
            }

            // Based Orbs 💎
            ctx.fillStyle = '#ffff00';
            for (let orb of orbs) {
                ctx.beginPath();
                ctx.arc(orb.x + 12, orb.y + 12, 12, 0, Math.PI * 2);
                ctx.fill();
            }

            // Score
            ctx.fillStyle = '#00ff9d';
            ctx.font = 'bold 24px Courier New';
            ctx.fillText(`SCORE: ${Math.floor(score)}`, 30, 50);
        }

        function update() {
            if (!gameRunning) return;

            // Controls
            if (keys['arrowup'] || keys['w']) player.vy -= 0.6;
            if (keys['arrowdown'] || keys['s']) player.vy += 0.6;
            if (keys['arrowleft'] || keys['a']) player.vx -= 0.6;
            if (keys['arrowright'] || keys['d']) player.vx += 0.6;

            player.vx *= 0.88;
            player.vy *= 0.88;

            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < 20) player.x = 20;
            if (player.x > 720) player.x = 720;
            if (player.y < 20) player.y = 20;
            if (player.y > 540) player.y = 540;

            // Increase difficulty every 800 frames (~13 seconds)
            if (score % 800 === 0 && score > 0) {
                difficulty += 0.15;
            }

            // Spawn obstacles (gets more frequent with difficulty)
            if (Math.random() < 0.03 * difficulty) {
                obstacles.push({ x: canvas.width, y: Math.random() * 480 + 40 });
            }

            // Spawn orbs
            if (Math.random() < 0.018) {
                orbs.push({ x: canvas.width, y: Math.random() * 480 + 40 });
            }

            // Move obstacles (faster with difficulty)
            const obsSpeed = 4 + difficulty * 0.6;
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= obsSpeed;
                if (obstacles[i].x < -40) obstacles.splice(i, 1);
            }

            // Move orbs
            for (let i = orbs.length - 1; i >= 0; i--) {
                orbs[i].x -= 3.2;
                if (orbs[i].x < -30) orbs.splice(i, 1);
            }

            // Collision with obstacles
            for (let obs of obstacles) {
                if (
                    player.x < obs.x + 30 &&
                    player.x + player.size > obs.x &&
                    player.y < obs.y + 60 &&
                    player.y + 18 > obs.y
                ) {
                    gameOver();
                    return;
                }
            }

            // Collect orbs
            for (let i = orbs.length - 1; i >= 0; i--) {
                let orb = orbs[i];
                if (
                    player.x < orb.x + 24 &&
                    player.x + player.size > orb.x &&
                    player.y < orb.y + 24 &&
                    player.y + 18 > orb.y
                ) {
                    score += 50;
                    orbs.splice(i, 1);
                }
            }

            score += 1;
        }

        function gameOver() {
            gameRunning = false;
            alert(`💥 CRASHED IN THE BASEDVERSE 💥\n\nFinal Score: ${Math.floor(score)}\n\nRefresh to try again 🚀`);
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            score = 0;
            difficulty = 1;
            obstacles = [];
            orbs = [];
            player.x = 120;
            player.y = 280;
            player.vx = 0;
            player.vy = 0;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Show start screen on load
        startScreen.style.display = 'block';
        loop();
    </script>
</body>
</html>
