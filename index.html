<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BasedDodge 🚀</title>
    <style>
        body { margin:0; background:#0a0a0a; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; }
        canvas { border:2px solid #00ff9d; box-shadow:0 0 20px rgba(0,255,157,0.4); }
    </style>
</head>
<body>
    <canvas id="c" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let gameRunning = false;

        // Player rocket
        const player = { x: 120, y: 280, vx: 0, vy: 0, size: 28 };

        const keys = {};

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

        function draw() {
            // Background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simple stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 40; i++) {
                let x = (i * 47 + score * 0.8) % (canvas.width + 20) - 10;
                ctx.fillRect(x, (i * 13) % canvas.height, 1.5, 1.5);
            }

            // Player rocket
            ctx.fillStyle = '#00ff9d';
            ctx.fillRect(player.x, player.y, player.size, 18);           // body
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(player.x + 20, player.y + 4, 12, 10);           // nose

            // Flame
            ctx.fillStyle = '#ff4400';
            ctx.fillRect(player.x - 12, player.y + 5, 14, 8);
        }

        function update() {
            if (!gameRunning) return;

            // Controls
            if (keys['arrowup'] || keys['w']) player.vy -= 0.6;
            if (keys['arrowdown'] || keys['s']) player.vy += 0.6;
            if (keys['arrowleft'] || keys['a']) player.vx -= 0.6;
            if (keys['arrowright'] || keys['d']) player.vx += 0.6;

            player.vx *= 0.88;
            player.vy *= 0.88;

            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < 20) player.x = 20;
            if (player.x > 720) player.x = 720;
            if (player.y < 20) player.y = 20;
            if (player.y > 540) player.y = 540;

            score += 1;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Start the game immediately (minimal version)
        gameRunning = true;
        loop();
    </script>
</body>
</html>
