<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BasedDodge 🚀</title>
    <style>
        body { margin:0; background:#0a0a0a; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; }
        canvas { border:2px solid #00ff9d; box-shadow:0 0 20px rgba(0,255,157,0.4); }
    </style>
</head>
<body>
    <canvas id="c" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let gameRunning = true;

        // Player rocket
        const player = { x: 120, y: 280, vx: 0, vy: 0, size: 28 };

        // Obstacles
        let obstacles = [];

        // Based Orbs
        let orbs = [];

        const keys = {};

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

        function draw() {
            // Background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simple stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 40; i++) {
                let x = (i * 47 + score * 0.8) % (canvas.width + 20) - 10;
                ctx.fillRect(x, (i * 13) % canvas.height, 1.5, 1.5);
            }

            // Player rocket
            ctx.fillStyle = '#00ff9d';
            ctx.fillRect(player.x, player.y, player.size, 18);           // body
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(player.x + 20, player.y + 4, 12, 10);           // nose

            // Flame
            ctx.fillStyle = '#ff4400';
            ctx.fillRect(player.x - 12, player.y + 5, 14, 8);

            // Obstacles (red danger blocks)
            ctx.fillStyle = '#ff2222';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, 30, 60);
            }

            // Based Orbs 💎 (yellow glowing)
            ctx.fillStyle = '#ffff00';
            for (let orb of orbs) {
                ctx.beginPath();
                ctx.arc(orb.x + 12, orb.y + 12, 12, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function update() {
            if (!gameRunning) return;

            // Controls
            if (keys['arrowup'] || keys['w']) player.vy -= 0.6;
            if (keys['arrowdown'] || keys['s']) player.vy += 0.6;
            if (keys['arrowleft'] || keys['a']) player.vx -= 0.6;
            if (keys['arrowright'] || keys['d']) player.vx += 0.6;

            player.vx *= 0.88;
            player.vy *= 0.88;

            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < 20) player.x = 20;
            if (player.x > 720) player.x = 720;
            if (player.y < 20) player.y = 20;
            if (player.y > 540) player.y = 540;

            // Spawn obstacles
            if (Math.random() < 0.03) {
                obstacles.push({ x: canvas.width, y: Math.random() * 480 + 40 });
            }

            // Spawn orbs (less frequent)
            if (Math.random() < 0.018) {
                orbs.push({ x: canvas.width, y: Math.random() * 480 + 40 });
            }

            // Move obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 4;
                if (obstacles[i].x < -40) obstacles.splice(i, 1);
            }

            // Move orbs
            for (let i = orbs.length - 1; i >= 0; i--) {
                orbs[i].x -= 3.2;
                if (orbs[i].x < -30) orbs.splice(i, 1);
            }

            // Collision with obstacles → game over
            for (let obs of obstacles) {
                if (
                    player.x < obs.x + 30 &&
                    player.x + player.size > obs.x &&
                    player.y < obs.y + 60 &&
                    player.y + 18 > obs.y
                ) {
                    gameRunning = false;
                    alert(`💥 CRASHED IN THE BASEDVERSE 💥\n\nFinal Score: ${Math.floor(score)}\n\nRefresh to try again 🚀`);
                    return;
                }
            }

            // Collect orbs
            for (let i = orbs.length - 1; i >= 0; i--) {
                let orb = orbs[i];
                if (
                    player.x < orb.x + 24 &&
                    player.x + player.size > orb.x &&
                    player.y < orb.y + 24 &&
                    player.y + 18 > orb.y
                ) {
                    score += 50;
                    orbs.splice(i, 1);
                }
            }

            score += 1;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
