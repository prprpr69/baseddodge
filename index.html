<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasedDodge</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
        }
        canvas {
            image-rendering: pixelated;
            border: 2px solid #00ff9d;
            box-shadow: 0 0 30px #00ff9d;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff9d;
            font-size: 24px;
            text-shadow: 0 0 10px #00ff9d;
            pointer-events: none;
            z-index: 10;
        }
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff9d;
            text-align: center;
            font-size: 48px;
            text-shadow: 0 0 20px #00ff9d;
            pointer-events: none;
            z-index: 20;
        }
        #based-meter {
            position: absolute;
            top: 60px;
            left: 20px;
            width: 200px;
            height: 12px;
            background: #222;
            border: 2px solid #00ff9d;
            box-shadow: 0 0 10px #00ff9d;
            overflow: hidden;
        }
        #based-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffff00, #00ff9d);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span> &nbsp;&nbsp; HIGH: <span id="highscore">0</span></div>
    <div id="based-meter"><div id="based-fill"></div></div>
    <div id="start-screen">BASED DODGE<br><span style="font-size:24px;">PRESS SPACE TO LAUNCH 🚀</span></div>
    <canvas id="game" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highscoreElement = document.getElementById('highscore');
        const startScreen = document.getElementById('start-screen');
        const basedFill = document.getElementById('based-fill');

        // Game variables
        let gameRunning = false;
        let score = 0;
        let highScore = localStorage.getItem('basedDodgeHighScore') || 0;
        let lastTime = 0;
        let frameCount = 0;
        let difficulty = 1;
        let lastDifficultyIncrease = 0;

        // Based Meter
        let basedMeter = 0;        // 0 to 100
        const BASED_MAX = 100;

        // Rocket (player)
        let rocket = {
            x: 150,
            y: 300,
            vx: 0,
            vy: 0,
            size: 40,
            speed: 0.4,
            friction: 0.92,
            boostMultiplier: 1.0   // temporary boost when meter is full
        };

        // Arrays for obstacles and collectibles
        let obstacles = [];
        let orbs = [];

        // Simple Web Audio for sound effects
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playCollectSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.value = 0.3;
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => {
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                oscillator.stop(audioCtx.currentTime + 0.2);
            }, 50);
        }

        function playCrashSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.value = 0.4;
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.start();
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            oscillator.stop(audioCtx.currentTime + 0.7);
        }

        function playBoostSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(660, audioCtx.currentTime);
            gain.gain.value = 0.25;
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => {
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                oscillator.stop(audioCtx.currentTime + 0.45);
            }, 100);
        }

        // Input handling
        let keys = {};

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ' && !gameRunning) {
                startGame();
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        function startGame() {
            gameRunning = true;
            score = 0;
            difficulty = 1;
            basedMeter = 0;
            lastDifficultyIncrease = Date.now();
            rocket.x = 150;
            rocket.y = 300;
            rocket.vx = 0;
            rocket.vy = 0;
            rocket.boostMultiplier = 1.0;
            obstacles = [];
            orbs = [];
            startScreen.style.display = 'none';
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            scoreElement.textContent = Math.floor(score);
            highscoreElement.textContent = Math.floor(highScore);
            basedFill.style.width = `${basedMeter}%`;
        }

        function spawnObstacle() {
            const height = 40 + Math.random() * 80;
            obstacles.push({
                x: canvas.width + 50,
                y: Math.random() * (canvas.height - height),
                width: 30,
                height: height,
                speed: (3 + Math.random() * 2) * difficulty
            });
        }

        function spawnOrb() {
            orbs.push({
                x: canvas.width + 50,
                y: Math.random() * (canvas.height - 30),
                size: 18,
                speed: (2.8 + Math.random() * 1.5) * difficulty
            });
        }

        function increaseDifficulty() {
            const now = Date.now();
            if (now - lastDifficultyIncrease > 10000) {
                difficulty += 0.15;
                lastDifficultyIncrease = now;
            }
        }

        function update() {
            // Rocket movement with inertia + boost
            let currentSpeed = rocket.speed * rocket.boostMultiplier;
            if (keys['arrowup'] || keys['w']) rocket.vy -= currentSpeed;
            if (keys['arrowdown'] || keys['s']) rocket.vy += currentSpeed;
            if (keys['arrowleft'] || keys['a']) rocket.vx -= currentSpeed;
            if (keys['arrowright'] || keys['d']) rocket.vx += currentSpeed;

            // Apply friction
            rocket.vx *= rocket.friction;
            rocket.vy *= rocket.friction;

            // Update position
            rocket.x += rocket.vx;
            rocket.y += rocket.vy;

            // Keep rocket in bounds
            if (rocket.x < 20) rocket.x = 20;
            if (rocket.x > canvas.width - 60) rocket.x = canvas.width - 60;
            if (rocket.y < 20) rocket.y = 20;
            if (rocket.y > canvas.height - 60) rocket.y = canvas.height - 60;

            // Increase difficulty over time
            increaseDifficulty();

            // Spawn obstacles and orbs
            frameCount++;
            if (frameCount % 45 === 0) spawnObstacle();
            if (frameCount % 38 === 0) spawnOrb();

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= obs.speed;

                // Collision with rocket
                if (
                    rocket.x < obs.x + obs.width &&
                    rocket.x + rocket.size > obs.x &&
                    rocket.y < obs.y + obs.height &&
                    rocket.y + rocket.size > obs.y
                ) {
                    playCrashSound();
                    gameOver();
                    return;
                }

                // Remove off-screen
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }

            // Update orbs
            for (let i = orbs.length - 1; i >= 0; i--) {
                const orb = orbs[i];
                orb.x -= orb.speed;

                // Collect orb
                const dx = rocket.x + rocket.size / 2 - orb.x;
                const dy = rocket.y + rocket.size / 2 - orb.y;
                if (Math.sqrt(dx * dx + dy * dy) < rocket.size / 2 + orb.size / 2) {
                    score += 50;
                    basedMeter = Math.min(BASED_MAX, basedMeter + 8); // fill meter
                    playCollectSound();
                    orbs.splice(i, 1);
                    updateUI();

                    // Full meter = temporary boost
                    if (basedMeter >= BASED_MAX) {
                        rocket.boostMultiplier = 1.6;
                        playBoostSound();
                        // Auto-drain meter over time
                        setTimeout(() => {
                            if (gameRunning) rocket.boostMultiplier = 1.0;
                        }, 2800);
                        basedMeter = 0;
                        updateUI();
                    }
                    continue;
                }

                // Remove off-screen
                if (orb.x + orb.size < 0) {
                    orbs.splice(i, 1);
                }
            }

            // Survival score
            score += 0.08 * difficulty;
            updateUI();
        }

        function drawBackground() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Cyber grid lines
            ctx.strokeStyle = '#00ff9d22';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Distant stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 80; i++) {
                const sx = (i * 73) % canvas.width;
                const sy = (i * 37) % canvas.height;
                ctx.fillRect(sx, sy, 1, 1);
            }
        }

        function drawRocket() {
            ctx.save();
            ctx.translate(rocket.x + rocket.size / 2, rocket.y + rocket.size / 2);
            
            // Slight tilt based on velocity
            const tilt = rocket.vx * 0.8;
            ctx.rotate(tilt * Math.PI / 180);

            // Rocket body (based green)
            ctx.fillStyle = rocket.boostMultiplier > 1 ? '#00ffdd' : '#00ff9d';
            ctx.fillRect(-18, -12, 36, 24);

            // Nose cone
            ctx.fillStyle = rocket.boostMultiplier > 1 ? '#00aaff' : '#00cc77';
            ctx.beginPath();
            ctx.moveTo(18, 0);
            ctx.lineTo(30, -8);
            ctx.lineTo(30, 8);
            ctx.closePath();
            ctx.fill();

            // Flames 🚀 (bigger when boosting)
            const flameLength = rocket.boostMultiplier > 1 ? 18 : 12;
            ctx.fillStyle = '#ff4400';
            ctx.beginPath();
            ctx.moveTo(-22, -6);
            ctx.lineTo(-30 - Math.random() * flameLength, 0);
            ctx.lineTo(-22, 6);
            ctx.fill();

            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.moveTo(-20, -3);
            ctx.lineTo(-28 - Math.random() * (flameLength - 4), 0);
            ctx.lineTo(-20, 3);
            ctx.fill();

            ctx.restore();
        }

        function drawObstacles() {
            ctx.fillStyle = '#ff2244';
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                
                // Danger glow
                ctx.strokeStyle = '#ff0000aa';
                ctx.lineWidth = 4;
                ctx.strokeRect(obs.x - 3, obs.y - 3, obs.width + 6, obs.height + 6);
            }
        }

        function drawOrbs() {
            for (let orb of orbs) {
                // Glow
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ffff00';
                
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, orb.size / 2, 0, Math.PI * 2);
                ctx.fill();

                // Inner diamond 💎
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(orb.x, orb.y - orb.size / 3);
                ctx.lineTo(orb.x + orb.size / 3, orb.y);
                ctx.lineTo(orb.x, orb.y + orb.size / 3);
                ctx.lineTo(orb.x - orb.size / 3, orb.y);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
            }
        }

        function draw() {
            drawBackground();
            drawOrbs();
            drawObstacles();
            drawRocket();
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            lastTime = timestamp;

            if (gameRunning) {
                update();
                draw();
            }

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('basedDodgeHighScore', Math.floor(highScore));
            }
            startScreen.innerHTML = `GAME OVER<br>FINAL SCORE: ${Math.floor(score)}<br>HIGH SCORE: ${Math.floor(highScore)}<br><span style="font-size:24px;">PRESS SPACE TO RESTART 🚀</span>`;
            startScreen.style.display = 'block';
            updateUI();
        }

        // Initial setup
        highscoreElement.textContent = Math.floor(highScore);
        drawBackground();
        drawRocket();
    </script>
</body>
</html>
